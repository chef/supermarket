services:
  db:
    image: postgres:13.4
    ports:
      - "127.0.0.1:15432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  cache:
    image: redis:6.2.5
    ports:
      - "127.0.0.1:16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: supermarket-test:latest
    depends_on:
      - db
      - cache
    env_file:
      - .env                      # load all secrets (GitHub keys, OAuth, etc.)
    environment:
      # These override .env to wire the app to Docker service hostnames.
      # 'environment' keys take precedence over 'env_file' values.
      POSTGRES_IP: db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://cache:6379
    ports:
      - "3000:3000"               # Rails web interface
    command: bundle exec rails server -b 0.0.0.0 -p 3000
    volumes:
      - .:/app
